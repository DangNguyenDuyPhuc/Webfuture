<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Nhập</title>
    <style>
        /* Thiết lập phông chữ chung giống với hình ảnh (Serif) */
        body {
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }

        /* Khung bên ngoài */
        .login-container {
            background-color: #d8d8d8;
            /* Màu nền xám nhạt */
            border: 12px solid #1a8b1a;
            /* Viền xanh lá cây dày */
            width: 320px;
            padding: 20px 30px;
            box-sizing: border-box;
        }

        /* Tiêu đề */
        .login-container h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            color: #000;
        }

        /* Nhóm ô nhập liệu */
        .input-group {
            margin-bottom: 15px;
        }

        /* Ô input (màu trắng, viền dưới màu đỏ) */
        .input-group input[type="text"],
        .input-group input[type="password"] {
            width: 100%;
            height: 35px;
            border: none;
            border-bottom: 2px solid #d32f2f;
            /* Viền dưới màu đỏ */
            background-color: #ffffff;
            box-sizing: border-box;
            outline: none;
        }

        /* Nhãn (Label) nằm dưới ô input */
        .input-group label {
            display: block;
            margin-top: 5px;
            font-size: 16px;
            color: #000;
        }

        /* Nhóm Radio button (Giới tính) */
        .radio-group {
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .radio-group div {
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }

        .radio-group input[type="radio"] {
            margin: 0 5px 0 0;
        }

        /* Nhóm Checkbox (Lưu đăng nhập) */
        .checkbox-group {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0 5px 0 0;
        }

        /* Nút đăng nhập */
        .submit-btn {
            background-color: #1aab6b;
            /* Màu xanh ngọc */
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 15px;
            font-family: Arial, sans-serif;
            /* Phông chữ nút là sans-serif theo ảnh */
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #158f58;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Đăng nhập</h2>
        <form>
            <div class="input-group">
                <input type="text" id="username" name="username">
                <label for="username">Tên đăng nhập</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password">
                <label for="password">Mật khẩu</label>
            </div>

            <div class="radio-group">
                <div>
                    <input type="radio" id="nam" name="gender" value="nam" checked>
                    <label for="nam">Nam</label>
                </div>
                <div>
                    <input type="radio" id="nu" name="gender" value="nu">
                    <label for="nu">Nữ</label>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Lưu giá trị đăng nhập</label>
            </div>

            <button type="submit" class="submit-btn">Đăng nhập</button>
        </form>
    </div>

</body>

</html>
