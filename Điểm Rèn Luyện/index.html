<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hệ thống quản lý điểm rèn luyện sinh viên - Thống kê kết quả đánh giá">
    <title>Điểm rèn luyện | Thống kê lớp</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar" id="sidebar">
        <!-- Logo & Tiêu đề -->
        <div class="sidebar-header">
            <h1 class="sidebar-title">ĐIỂM RÈN LUYỆN</h1>
        </div>

        <!-- Thông tin người dùng -->
        <div class="user-info">
            <div class="user-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="user-details">
                <span class="user-name">DP</span>
                <div class="user-badges">
                    <span class="badge badge-role"> Sinh viên</span>
                </div>
            </div>
        </div>

        <!-- Menu điều hướng -->
        <nav class="sidebar-nav">
            <a href="#" class="nav-item">
                <i class="fas fa-book-open"></i>
                <span>Hướng dẫn sử dụng</span>
            </a>

            <div class="nav-group">
                <span class="nav-group-title">KẾT QUẢ ĐÁNH GIÁ</span>
                <a href="#" class="nav-item">
                    <i class="fas fa-list-check"></i>
                    <span>Danh sách kết quả</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Danh sách lớp</span>
                </a>
            </div>

            <a href="#" class="nav-item active">
                <i class="fas fa-chart-pie"></i>
                <span>Thống kê lớp</span>
            </a>
        </nav>
    </aside>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">
        <!-- Thanh trên cùng -->
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle" aria-label="Mở menu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="topbar-actions">
                <button class="topbar-btn" title="Finish update">
                    <i class="fas fa-sync-alt"></i>
                    <span>Finish update</span>
                </button>
                <button class="topbar-btn" title="Thông báo">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="topbar-btn" title="Cài đặt">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </header>

        <!-- Nội dung chính -->
        <div class="content-wrapper">
            <!-- Tiêu đề trang -->
            <div class="page-header">
                <h2 class="page-title">Thống kê kết quả đánh giá</h2>
            </div>

            <!-- ===== BỘ LỌC TÌM KIẾM ===== -->
            <section class="filter-section">
                <h3 class="section-title">Thông tin tìm kiếm</h3>
                <div class="filter-grid">
                    <div class="filter-group">
                        <label for="semester">Học kỳ</label>
                        <select id="semester">
                            <option value="HK1-2025-2026" selected>HK1-2025-2026</option>
                            <option value="HK2-2024-2025">HK2-2024-2025</option>
                            <option value="HK1-2024-2025">HK1-2024-2025</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="classSelect">Lớp</label>
                        <select id="classSelect">
                            <option value="DA25TTD" selected>DA25TTD - ĐH Công nghệ thông tin D 2025</option>
                            <option value="DA25TTA">DA25TTA - ĐH Công nghệ thông tin A 2025</option>
                            <option value="DA25TTB">DA25TTB - ĐH Công nghệ thông tin B 2025</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="classification">Xếp loại</label>
                        <select id="classification">
                            <option value="">Tất cả</option>
                            <option value="Xuất sắc">Xuất sắc</option>
                            <option value="Tốt">Tốt</option>
                            <option value="Khá">Khá</option>
                            <option value="Trung bình">Trung bình</option>
                            <option value="Yếu">Yếu</option>
                            <option value="Kém">Kém</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="role">Vai trò</label>
                        <select id="role">
                            <option value="hoidong" selected>Hội đồng đánh giá</option>
                            <option value="canhan">Cá nhân</option>
                            <option value="lop">Lớp</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary" id="searchBtn">
                        <i class="fas fa-search"></i> Tìm kiếm
                    </button>
                    <button class="btn btn-outline" id="resetBtn">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
            </section>

            <!-- ===== KHU VỰC BẢNG + BIỂU ĐỒ ===== -->
            <div class="data-area">
                <!-- Bảng danh sách sinh viên -->
                <section class="table-section">
                    <h3 class="section-title">Danh sách Sinh viên</h3>
                    <div class="table-wrapper">
                        <table id="studentTable">
                            <thead>
                                <tr>
                                    <th class="col-stt">STT</th>
                                    <th class="col-mssv">MSSV</th>
                                    <th class="col-name">Họ và tên</th>
                                    <th class="col-score">Số điểm</th>
                                    <th class="col-rank">Xếp loại</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody">
                                <!-- Dữ liệu sinh viên sẽ được render bởi JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Phân trang -->
                    <div class="pagination" id="pagination">
                        <!-- Nút phân trang được render bởi JavaScript -->
                    </div>
                </section>

                <!-- Biểu đồ thống kê -->
                <section class="chart-section">
                    <h3 class="section-title">Tỉ lệ điểm rèn luyện</h3>
                    <div class="chart-container">
                        <canvas id="statsChart"></canvas>
                    </div>
                    <div class="chart-legend" id="chartLegend">
                        <!-- Chú thích biểu đồ được render bởi JavaScript -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Overlay cho mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
</body>

</html>
